<svg width="760" height="540" viewBox="0 0 760 540" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <rect width="760" height="540" fill="none" stroke="none"/>

  <!-- Login -->
  <rect x="300" y="20" width="160" height="46" rx="8" fill="#EFEFEF" stroke="#666666" stroke-width="1.5"/>
  <text x="380" y="48" text-anchor="middle" font-size="14" fill="#1a1a1a" font-weight="bold">Login / sign up</text>

  <line x1="380" y1="66" x2="380" y2="104" stroke="#444444" stroke-width="2"/>

  <!-- Main menu -->
  <rect x="280" y="104" width="200" height="46" rx="8" fill="#DCEBF9" stroke="#1F5C99" stroke-width="1.5"/>
  <text x="380" y="132" text-anchor="middle" font-size="14" fill="#0d2b47" font-weight="bold">Main menu</text>

  <!-- Branch lines -->
  <line x1="320" y1="150" x2="150" y2="198" stroke="#444444" stroke-width="2"/>
  <line x1="380" y1="150" x2="380" y2="198" stroke="#444444" stroke-width="2"/>
  <line x1="440" y1="150" x2="620" y2="198" stroke="#444444" stroke-width="2"/>

  <!-- Manage records -->
  <rect x="80" y="198" width="140" height="58" rx="8" fill="#D7F0E3" stroke="#1F6B41" stroke-width="1.5"/>
  <text x="150" y="222" text-anchor="middle" font-size="14" fill="#0d3320" font-weight="bold">Manage records</text>
  <text x="150" y="242" text-anchor="middle" font-size="12" fill="#1a1a1a">show / add / remove</text>

  <!-- Manage budget -->
  <rect x="310" y="198" width="140" height="58" rx="8" fill="#FBEAD2" stroke="#A1700D" stroke-width="1.5"/>
  <text x="380" y="222" text-anchor="middle" font-size="14" fill="#4d3500" font-weight="bold">Manage budget</text>
  <text x="380" y="242" text-anchor="middle" font-size="12" fill="#1a1a1a">show / add / remove</text>

  <!-- Settings -->
  <rect x="530" y="198" width="180" height="58" rx="8" fill="#FBE3D8" stroke="#A1431F" stroke-width="1.5"/>
  <text x="620" y="222" text-anchor="middle" font-size="14" fill="#4d2000" font-weight="bold">Settings</text>
  <text x="620" y="242" text-anchor="middle" font-size="12" fill="#1a1a1a">currency / backup / account</text>

  <line x1="150" y1="256" x2="150" y2="288" stroke="#444444" stroke-width="2"/>
  <line x1="380" y1="256" x2="380" y2="288" stroke="#444444" stroke-width="2"/>
  <line x1="620" y1="256" x2="620" y2="288" stroke="#444444" stroke-width="2"/>

  <!-- Record actions -->
  <rect x="50" y="288" width="200" height="200" rx="10" fill="#fbfbfb" stroke="#999999" stroke-width="1.5"/>
  <text x="62" y="310" font-size="13" fill="#333333" font-weight="bold">Record actions</text>

  <rect x="62" y="324" width="176" height="36" rx="5" fill="#ffffff" stroke="#bbbbbb"/>
  <text x="150" y="346" text-anchor="middle" font-size="13" fill="#1a1a1a">Show records (filter)</text>

  <rect x="62" y="370" width="176" height="36" rx="5" fill="#ffffff" stroke="#bbbbbb"/>
  <text x="150" y="392" text-anchor="middle" font-size="13" fill="#1a1a1a">Add record</text>

  <rect x="62" y="416" width="176" height="36" rx="5" fill="#ffffff" stroke="#bbbbbb"/>
  <text x="150" y="438" text-anchor="middle" font-size="13" fill="#1a1a1a">Remove record</text>

  <!-- Budget actions -->
  <rect x="280" y="288" width="200" height="156" rx="10" fill="#fbfbfb" stroke="#999999" stroke-width="1.5"/>
  <text x="292" y="310" font-size="13" fill="#333333" font-weight="bold">Budget actions</text>

  <rect x="292" y="324" width="176" height="36" rx="5" fill="#ffffff" stroke="#bbbbbb"/>
  <text x="380" y="346" text-anchor="middle" font-size="13" fill="#1a1a1a">Show budget</text>

  <rect x="292" y="370" width="176" height="36" rx="5" fill="#ffffff" stroke="#bbbbbb"/>
  <text x="380" y="392" text-anchor="middle" font-size="13" fill="#1a1a1a">Add / remove budget</text>

  <!-- Settings actions -->
  <rect x="510" y="288" width="220" height="200" rx="10" fill="#fbfbfb" stroke="#999999" stroke-width="1.5"/>
  <text x="522" y="310" font-size="13" fill="#333333" font-weight="bold">Settings actions</text>

  <rect x="522" y="324" width="196" height="36" rx="5" fill="#ffffff" stroke="#bbbbbb"/>
  <text x="620" y="346" text-anchor="middle" font-size="13" fill="#1a1a1a">Currency / CSV / backup</text>

  <rect x="522" y="370" width="196" height="36" rx="5" fill="#ffffff" stroke="#bbbbbb"/>
  <text x="620" y="392" text-anchor="middle" font-size="13" fill="#1a1a1a">Change password</text>

  <rect x="522" y="416" width="196" height="36" rx="5" fill="#ffffff" stroke="#bbbbbb"/>
  <text x="620" y="438" text-anchor="middle" font-size="13" fill="#1a1a1a">Delete account</text>
</svg>